<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeClick AI</title>
<link rel="stylesheet" href="safeclickstyle.css">
</head>

<body>

<div class="container">

    <div class="header">
        <div class="logo-title">
            <link href="logo.png">
            <h1>SafeClick AI</h1>
        </div>
        <p>AI-Powered Phishing Detection System</p>
    </div>

    <div class="stats">

        <div class="card">
            <h2 id="totalScans">0</h2>
            <p>Total Scans</p>
        </div>

        <div class="card">
            <h2 id="safeCount">0</h2>
            <p>Safe Links</p>
        </div>

        <div class="card">
            <h2 id="dangerCount">0</h2>
            <p>Dangerous Links</p>
        </div>

    </div>

    <input type="text" id="urlInput" placeholder="Paste URL here...">

    <button onclick="checkLink()">🔍 Scan Link</button>

    <div id="result"></div>
    <div id="confidence"></div>

    <div class="meter">
        <div id="bar"></div>
    </div>

    <h3>📜 Recent Scans</h3>
    <ul id="history"></ul>

    <button class="report-btn" onclick="generateReport()">
        📄 Generate Security Report
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
